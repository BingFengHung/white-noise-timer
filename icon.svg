    <linearGradient id="moonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F08A5D;stop-opacity:1" />
